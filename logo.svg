<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3FAE91"/>
      <stop offset="1" stop-color="#0E7C66"/>
    </linearGradient>
  </defs>
  <!-- camera body -->
  <circle cx="430" cy="610" r="285" fill="#242927"/>
  <!-- lens ring with shutter gap (upper-left) -->
  <circle cx="445" cy="628" r="152" fill="none" stroke="#FFFFFF"
          stroke-width="38" stroke-linecap="round"
          stroke-dasharray="870 85" stroke-dashoffset="317"/>
  <!-- AI badge -->
  <rect x="556" y="196" width="308" height="250" rx="58" fill="url(#badge)"/>
  <text x="710" y="366" font-family="DejaVu Serif" font-style="italic"
        font-weight="bold" font-size="150" fill="#FFFFFF"
        text-anchor="middle">AI</text>
  <line x1="612" y1="340" x2="806" y2="340" stroke="#FFFFFF" stroke-width="10"/>
</svg>
